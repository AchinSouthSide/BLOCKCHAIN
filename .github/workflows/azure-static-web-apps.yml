name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # CRA uses build-time env vars. Put your values in GitHub repo Variables/Secrets.
      # Recommended (Hardhat local mode):
      # - REACT_APP_NETWORK_ID=31337
      # - REACT_APP_CONTRACT_ADDRESS=0x... (your localhost deployed contract address)
      - name: Build Frontend
        working-directory: ./frontend
        env:
          REACT_APP_NETWORK_ID: ${{ vars.REACT_APP_NETWORK_ID }}
          REACT_APP_CONTRACT_ADDRESS: ${{ vars.REACT_APP_CONTRACT_ADDRESS }}
          REACT_APP_HARDHAT_RPC: ${{ vars.REACT_APP_HARDHAT_RPC }}
          REACT_APP_SEPOLIA_RPC: ${{ vars.REACT_APP_SEPOLIA_RPC }}
        run: |
          npm ci
          npm run build

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "build"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close PR deployment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"

<!DOCTYPE html>
<html>
<head>
    <title>MetaMask Hardhat Network Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-box {
            background: white;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        .test-box.passed {
            border-left-color: #28a745;
            background: #f0fff4;
        }
        .test-box.failed {
            border-left-color: #dc3545;
            background: #fff5f5;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            max-height: 200px;
        }
        .log-box {
            background: #222;
            color: #0f0;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin: 10px 0;
        }
        .log-line {
            margin: 2px 0;
        }
        .log-success { color: #0f0; }
        .log-error { color: #f00; }
        .log-warn { color: #ff0; }
        .log-info { color: #0ff; }
    </style>
</head>
<body>
    <h1>🔧 MetaMask + Hardhat Network Tester</h1>
    
    <div class="test-box">
        <h3>Step 1: Check MetaMask Installation</h3>
        <button class="btn-primary" onclick="checkMetaMask()">Check MetaMask</button>
        <div class="log-box" id="log"></div>
    </div>

    <div class="test-box">
        <h3>Step 2: Add Hardhat Network</h3>
        <button class="btn-primary" onclick="addHardhatNetwork()">Add Hardhat Network (0x7a69)</button>
        <button class="btn-danger" onclick="clearLog()">Clear Log</button>
    </div>

    <div class="test-box">
        <h3>Step 3: Switch to Hardhat</h3>
        <button class="btn-success" onclick="switchToHardhat()">Switch to Hardhat</button>
    </div>

    <div class="test-box">
        <h3>Step 4: Get Accounts</h3>
        <button class="btn-success" onclick="getAccounts()">Request Accounts</button>
    </div>

    <div class="test-box">
        <h3>Step 5: Check Current Network</h3>
        <button class="btn-primary" onclick="getCurrentNetwork()">Get Current Network</button>
    </div>

    <div class="test-box">
        <h3>Logs</h3>
        <div class="log-box" id="mainLog"></div>
    </div>

    <script>
        const logBox = document.getElementById('mainLog');

        function log(message, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            const icon = {
                'success': '✅',
                'error': '❌',
                'warn': '⚠️',
                'info': 'ℹ️'
            }[type] || '•';
            
            line.textContent = `[${timestamp}] ${icon} ${message}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[${type}] ${message}`);
        }

        function clearLog() {
            logBox.innerHTML = '';
        }

        async function checkMetaMask() {
            log('🚀 Checking MetaMask installation...', 'info');
            
            if (typeof window.ethereum === 'undefined') {
                log('❌ MetaMask NOT installed!', 'error');
                return;
            }

            log('✅ MetaMask is installed', 'success');
            log(`   - Provider: ${window.ethereum.constructor.name}`, 'info');
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                log(`✅ Already connected to ${accounts.length} account(s)`, 'success');
            } catch (err) {
                log(`⚠️ Not yet connected: ${err.message}`, 'warn');
            }

            try {
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                const chainIdNum = parseInt(chainId, 16);
                log(`ℹ️ Current Chain ID: ${chainId} (${chainIdNum})`, 'info');
            } catch (err) {
                log(`❌ Error getting chain ID: ${err.message}`, 'error');
            }
        }

        async function addHardhatNetwork() {
            log('🚀 Adding Hardhat Network to MetaMask...', 'info');

            if (!window.ethereum) {
                log('❌ MetaMask not found!', 'error');
                return;
            }

            try {
                const result = await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [
                        {
                            chainId: '0x7a69',
                            chainName: 'Hardhat Local',
                            rpcUrls: ['http://127.0.0.1:8545'],
                            nativeCurrency: {
                                name: 'Ethereum',
                                symbol: 'ETH',
                                decimals: 18,
                            },
                            blockExplorerUrls: [],
                        },
                    ],
                });

                log('✅ Network added successfully!', 'success');
                log(`   Result: ${JSON.stringify(result)}`, 'info');
            } catch (error) {
                log(`❌ Error code: ${error.code}`, 'error');
                log(`   Error message: ${error.message}`, 'error');
                
                if (error.code === 4001) {
                    log('   → User rejected the request', 'warn');
                } else if (error.code === 4902) {
                    log('   → Network not found (need to add it)', 'warn');
                } else if (error.code === -32602) {
                    log('   → Invalid params (network may already exist)', 'warn');
                }
            }
        }

        async function switchToHardhat() {
            log('🚀 Switching to Hardhat Network...', 'info');

            if (!window.ethereum) {
                log('❌ MetaMask not found!', 'error');
                return;
            }

            try {
                const result = await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x7a69' }],
                });

                log('✅ Switched to Hardhat successfully!', 'success');
                log(`   Result: ${JSON.stringify(result)}`, 'info');
            } catch (error) {
                log(`❌ Error code: ${error.code}`, 'error');
                log(`   Error message: ${error.message}`, 'error');
                
                if (error.code === 4902) {
                    log('   → Network not in MetaMask yet. Try "Add Hardhat Network" first.', 'warn');
                } else if (error.code === 4001) {
                    log('   → User rejected switching network', 'warn');
                }
            }
        }

        async function getAccounts() {
            log('🚀 Requesting accounts from MetaMask...', 'info');

            if (!window.ethereum) {
                log('❌ MetaMask not found!', 'error');
                return;
            }

            try {
                const accounts = await window.ethereum.request({
                    method: 'eth_requestAccounts',
                });

                log(`✅ Got ${accounts.length} account(s)`, 'success');
                accounts.forEach((acc, idx) => {
                    log(`   #${idx}: ${acc}`, 'info');
                });
            } catch (error) {
                log(`❌ Error code: ${error.code}`, 'error');
                log(`   Error message: ${error.message}`, 'error');
            }
        }

        async function getCurrentNetwork() {
            log('🚀 Checking current network...', 'info');

            if (!window.ethereum) {
                log('❌ MetaMask not found!', 'error');
                return;
            }

            try {
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                const chainIdNum = parseInt(chainId, 16);

                log(`Current Chain ID: ${chainId} (${chainIdNum})`, 'info');

                if (chainIdNum === 31337) {
                    log(`✅ ON HARDHAT NETWORK!`, 'success');
                } else {
                    log(`⚠️ NOT on Hardhat (expected 31337, got ${chainIdNum})`, 'warn');
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            log('Page loaded. MetaMask Tester ready.', 'success');
            setTimeout(() => checkMetaMask(), 500);
        });
    </script>
</body>
</html>

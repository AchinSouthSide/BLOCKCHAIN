<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Card background -->
  <rect width="300" height="200" rx="10" fill="#FF6B35"/>
  
  <!-- Card inner shadow -->
  <rect x="10" y="10" width="280" height="180" rx="8" fill="none" stroke="#FFA500" stroke-width="2"/>
  
  <!-- GrabMart logo area -->
  <text x="150" y="50" font-size="24" font-weight="bold" fill="white" text-anchor="middle">GrabMart</text>
  
  <!-- Amount -->
  <text x="150" y="90" font-size="32" font-weight="bold" fill="white" text-anchor="middle">500K</text>
  
  <!-- Label -->
  <text x="150" y="130" font-size="16" fill="white" text-anchor="middle">VND</text>
  
  <!-- Decoration -->
  <circle cx="50" cy="150" r="8" fill="white"/>
  <circle cx="250" cy="150" r="8" fill="white"/>
</svg>
<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Voucher background -->
  <rect width="300" height="200" fill="white" stroke="#F38181" stroke-width="3" rx="8"/>
  
  <!-- Pattern fill -->
  <defs>
    <pattern id="stripes" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#F38181" stroke-width="5" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="300" height="200" fill="url(#stripes)"/>
  
  <!-- Header -->
  <rect width="300" height="40" fill="#F38181"/>
  <text x="150" y="27" font-size="18" font-weight="bold" fill="white" text-anchor="middle">💪 GYM PASS</text>
  
  <!-- Main text -->
  <text x="150" y="90" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">12 Tháng Miễn Phí</text>
  <text x="150" y="115" font-size="14" fill="#666" text-anchor="middle">Tập Luyện Không Giới Hạn</text>
  
  <!-- Duration indicator -->
  <circle cx="50" cy="150" r="15" fill="#F38181" opacity="0.3"/>
  <text x="50" y="155" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">12</text>
  
  <text x="75" y="155" font-size="12" fill="#666">tháng</text>
  
  <!-- Code -->
  <text x="150" y="185" font-size="11" font-family="monospace" fill="#999" text-anchor="middle">CODE: GYM12M2026</text>
</svg>
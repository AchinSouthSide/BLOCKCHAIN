<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- iPhone background -->
  <rect width="300" height="200" fill="#f5f5f5"/>
  
  <!-- Phone body -->
  <rect x="75" y="20" width="150" height="160" rx="15" fill="#FF8C42"/>
  
  <!-- Screen -->
  <rect x="85" y="30" width="130" height="120" rx="10" fill="white"/>
  
  <!-- Camera notch -->
  <circle cx="150" cy="35" r="6" fill="#666"/>
  
  <!-- Home button -->
  <circle cx="150" cy="160" r="8" fill="#FF8C42"/>
  
  <!-- Text -->
  <text x="150" y="180" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">iPhone 17</text>
</svg>
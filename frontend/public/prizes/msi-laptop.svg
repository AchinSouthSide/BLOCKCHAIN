<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Laptop base -->
  <rect x="50" y="20" width="200" height="130" rx="8" fill="#333"/>
  
  <!-- Screen -->
  <rect x="60" y="30" width="180" height="100" fill="#000"/>
  
  <!-- MSI logo -->
  <text x="150" y="90" font-size="24" font-weight="bold" fill="#FF0000" text-anchor="middle">MSI</text>
  
  <!-- Keyboard area -->
  <rect x="50" y="150" width="200" height="30" fill="#555"/>
  
  <!-- Keyboard keys indication -->
  <line x1="60" y1="160" x2="240" y2="160" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="170" x2="240" y2="170" stroke="#333" stroke-width="1"/>
  
  <!-- Text -->
  <text x="150" y="195" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">TITAN SERIES</text>
</svg>
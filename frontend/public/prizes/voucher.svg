<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Voucher background -->
  <rect width="300" height="200" fill="white" stroke="#FFD93D" stroke-width="3" rx="8"/>
  
  <!-- Pattern fill -->
  <defs>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#FFD93D" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="300" height="200" fill="url(#dots)"/>
  
  <!-- Header -->
  <rect width="300" height="40" fill="#FFD93D"/>
  <text x="150" y="27" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">🎁 VOUCHER</text>
  
  <!-- Main text -->
  <text x="150" y="90" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">Ăn Chay Miễn Phí</text>
  <text x="150" y="115" font-size="14" fill="#666" text-anchor="middle">Trọn Đời</text>
  
  <!-- Bottom decoration -->
  <line x1="30" y1="140" x2="270" y2="140" stroke="#FFD93D" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Code -->
  <text x="150" y="170" font-size="11" font-family="monospace" fill="#999" text-anchor="middle">CODE: VEGETARIAN2026</text>
</svg>